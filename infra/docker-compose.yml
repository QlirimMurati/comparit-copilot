services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: copilot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: copilot
    ports:
      - '55432:5432'
    volumes:
      - copilot-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d copilot']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: copilot-redis
    ports:
      - '56379:6379'
    volumes:
      - copilot-redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  copilot-pgdata:
  copilot-redisdata:
