<div>
  <form [formGroup]="form" class="filterbar">
    <div class="field">
      <span class="field-label">Date</span>
      <input type="date" class="input" style="width: 160px;" formControlName="date"/>
    </div>
    <button type="button" class="btn btn-ghost" (click)="fetch()" [disabled]="form.invalid || loading()">
      @if (loading()) { Loading… } @else { Load digest }
    </button>
    <button type="button" class="btn btn-primary" (click)="run()" [disabled]="form.invalid || running()">
      @if (running()) { Generating… } @else { Generate now }
    </button>
    <div class="spacer"></div>
  </form>

  @if (error(); as msg) {
    <div class="alert alert-error"><div class="content">{{ msg }}</div></div>
  }

  @if (notFound()) {
    <div class="alert alert-warning">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/>
        </svg>
      </div>
      <div class="content">No digest exists for this date yet — click <strong>Generate now</strong> to create one.</div>
    </div>
  }

  @if (digest(); as d) {
    <div class="section">
      <div class="section-head">
        <h3>{{ d.date }}</h3>
        <div class="right">
          <span class="badge badge-low">{{ d.reportCount }} reports</span>
          @if (d.filePath) {
            <span class="mono" style="color: var(--fg-3);">{{ d.filePath }}</span>
          }
        </div>
      </div>
      <div class="section-body">
        <pre class="code-block" style="max-height: 36rem; overflow: auto; white-space: pre-wrap;">{{ d.markdown }}</pre>
      </div>
    </div>
  }
</div>
