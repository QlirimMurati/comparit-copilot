<div class="max-w-md mx-auto mt-12">
  <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="text-xl font-semibold mb-1">Sign in</h1>
    <p class="text-sm text-slate-600 mb-4">comparit-copilot internal access</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <label class="block">
        <span class="block text-sm font-medium text-slate-700">Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="username"
          class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500"
        />
      </label>

      <label class="block">
        <span class="block text-sm font-medium text-slate-700">Password</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500"
        />
      </label>

      @if (error(); as msg) {
        <div class="text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded px-3 py-2">{{ msg }}</div>
      }

      <button
        type="submit"
        [disabled]="form.invalid || submitting()"
        class="w-full rounded-md bg-slate-900 text-white text-sm font-medium px-3 py-2 hover:bg-slate-800 disabled:opacity-50"
      >
        @if (submitting()) {
          Signing in…
        } @else {
          Sign in
        }
      </button>
    </form>
  </div>
</div>
