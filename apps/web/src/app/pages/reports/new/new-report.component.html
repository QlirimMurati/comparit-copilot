<div class="page" style="max-width: 760px;">
  <a routerLink="/reports" class="detail-back">← Back to reports</a>

  <div class="page-head">
    <div class="left">
      <h1 class="page-h">New report</h1>
      <p class="page-sub">Manual entry — the chat-based intake on the Workdesk page captures context automatically.</p>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="section">
    <div class="section-head"><h3>Report details</h3></div>
    <div class="section-body" style="display: flex; flex-direction: column; gap: 14px;">
      <div class="field">
        <label class="field-label">Title</label>
        <input type="text" class="input" formControlName="title" placeholder="One-line summary"/>
      </div>

      <div class="field">
        <label class="field-label">Description</label>
        <textarea class="textarea" formControlName="description" rows="6" placeholder="Steps to reproduce, expected vs actual, anything else relevant" style="font-family: var(--font-sans); font-size: 14px;"></textarea>
      </div>

      <div class="field-grid">
        <div class="field">
          <label class="field-label">Type</label>
          <select class="select" formControlName="type">
            @for (t of types; track t) { <option [value]="t">{{ typeLabels[t] }}</option> }
          </select>
        </div>
        <div class="field">
          <label class="field-label">Priority</label>
          <select class="select" formControlName="severity">
            @for (s of severities; track s) { <option [value]="s">{{ s }}</option> }
          </select>
        </div>
        <div class="field">
          <label class="field-label">Sparte (optional)</label>
          <select class="select" formControlName="sparte">
            <option [ngValue]="null">— none —</option>
            @for (s of sparten; track s) { <option [value]="s">{{ sparteLabels[s] }}</option> }
          </select>
        </div>
      </div>

      @if (error(); as msg) {
        <div class="alert alert-error" style="margin: 0;">
          <div class="content">{{ msg }}</div>
        </div>
      }

      <div style="display: flex; gap: 8px;">
        <button type="submit" class="btn btn-brand" [disabled]="form.invalid || submitting()">
          @if (submitting()) {
            Submitting…
          } @else {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>
            Submit report
          }
        </button>
        <a routerLink="/reports" class="btn btn-ghost" style="text-decoration: none;">Cancel</a>
      </div>
    </div>
  </form>
</div>
