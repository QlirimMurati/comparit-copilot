<section class="max-w-2xl space-y-4">
  <div>
    <h2 class="text-2xl font-semibold tracking-tight">New report</h2>
    <p class="text-sm text-slate-600">
      Manual entry for now — the embedded chatbot will handle context capture in Phase 2.
    </p>
  </div>

  <form
    [formGroup]="form"
    (ngSubmit)="submit()"
    class="space-y-4 rounded-xl border border-slate-200 bg-white p-6"
  >
    <label class="block">
      <span class="block text-sm font-medium text-slate-700">Title</span>
      <input
        type="text"
        formControlName="title"
        placeholder="One-line summary"
        class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500"
      />
    </label>

    <label class="block">
      <span class="block text-sm font-medium text-slate-700">Description</span>
      <textarea
        formControlName="description"
        rows="6"
        placeholder="Steps to reproduce, expected vs actual, anything else relevant"
        class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500"
      ></textarea>
    </label>

    <div class="grid grid-cols-2 gap-4">
      <label class="block">
        <span class="block text-sm font-medium text-slate-700">Severity</span>
        <select
          formControlName="severity"
          class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500"
        >
          @for (s of severities; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </label>

      <label class="block">
        <span class="block text-sm font-medium text-slate-700">Sparte (optional)</span>
        <select
          formControlName="sparte"
          class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500"
        >
          <option [ngValue]="null">— none —</option>
          @for (s of sparten; track s) {
            <option [value]="s">{{ sparteLabels[s] }}</option>
          }
        </select>
      </label>
    </div>

    @if (error(); as msg) {
      <div class="text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded px-3 py-2">{{ msg }}</div>
    }

    <div class="flex items-center gap-3">
      <button
        type="submit"
        [disabled]="form.invalid || submitting()"
        class="rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800 disabled:opacity-50"
      >
        @if (submitting()) {
          Submitting…
        } @else {
          Submit report
        }
      </button>
      <a routerLink="/reports" class="text-sm text-slate-600 hover:text-slate-900">Cancel</a>
    </div>
  </form>
</section>
