<header class="app-header bg-white border-b border-slate-200">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center gap-6">
    <a routerLink="/copilot" class="text-lg font-semibold tracking-tight">
      Comparit Copilot
    </a>
    @if (auth.isAuthenticated()) {
      <nav class="flex gap-4 text-sm">
        <a
          routerLink="/copilot"
          routerLinkActive="text-slate-900 font-medium"
          class="text-slate-600 hover:text-slate-900"
        >Copilot</a>
        <a
          routerLink="/reports"
          routerLinkActive="text-slate-900 font-medium"
          class="text-slate-600 hover:text-slate-900"
        >Reports</a>
        <a
          routerLink="/dashboards"
          routerLinkActive="text-slate-900 font-medium"
          class="text-slate-600 hover:text-slate-900"
        >Dashboards</a>
        <a
          routerLink="/prefill"
          routerLinkActive="text-slate-900 font-medium"
          class="text-slate-600 hover:text-slate-900"
        >Prefill</a>
        @if (isAdmin()) {
          <a
            routerLink="/admin"
            routerLinkActive="text-slate-900 font-medium"
            class="text-slate-600 hover:text-slate-900"
          >Admin</a>
        }
      </nav>
      <div class="ml-auto flex items-center gap-3 text-sm">
        <span class="text-slate-600">{{ auth.user()?.name }}</span>
        <button
          type="button"
          (click)="logout()"
          class="text-slate-600 hover:text-slate-900"
        >Sign out</button>
      </div>
    }
  </div>
</header>

@if (isFullscreen()) {
  <div class="fullscreen-outlet">
    <router-outlet />
  </div>
} @else {
  <main class="max-w-7xl mx-auto px-6 py-8 overflow-auto flex-1">
    <router-outlet />
  </main>
}
